version: "2"
run:
  timeout: 3m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - misspell
    - unconvert
    - ineffassign
    - copyloopvar

linters-settings:
  gosec:
    excludes:
      - G104
      - G301
      - G404
      - G706
  revive:
    rules:
      - name: error-return
      - name: error-strings
      - name: indent-error-flow

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
    - linters:
        - gosec
      text: "G104"
    - linters:
        - gosec
      text: "G301"

formatters:
  enable:
    - gofmt
