<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TokenLine Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#0f172a}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(180deg,#eef2ff,#f8fafc)}
.login .box{background:#fff;padding:40px;border-radius:20px;border:1px solid #e2e8f0;width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.06)}
.login .logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
.login input{width:100%;padding:14px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:15px;margin-bottom:12px;font-family:inherit}
.login input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.login button{width:100%;padding:14px;border-radius:12px;background:#6366f1;color:#fff;font-weight:600;border:none;cursor:pointer;font-size:15px;font-family:inherit;transition:all .2s}
.login button:hover{background:#4f46e5}
.login .err{color:#dc2626;font-size:13px;margin-top:8px;display:none}
.dash{max-width:1200px;margin:0 auto;padding:32px 24px}
.dash .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.dash .logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dash .topbar .time{font-size:12px;color:#94a3b8}
.dash h1{font-size:28px;font-weight:700;margin-bottom:4px}
.dash .sub{font-size:14px;color:#64748b;margin-bottom:28px}
/* Alerts */
.alerts{margin-bottom:20px}
.alert{padding:14px 18px;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.alert-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.alert-amber{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.alert-green{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:24px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:22px;transition:all .2s}
.card:hover{border-color:#c7d2fe;box-shadow:0 4px 20px rgba(99,102,241,.06)}
.card .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:8px}
.card .val{font-size:24px;font-weight:800;letter-spacing:-.5px}
.card .sub{font-size:11px;color:#94a3b8;margin-top:4px}
.big{grid-column:1/-1}.big .val{font-size:34px}
/* Charts row */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-box{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px}
.chart-box h3{font-size:14px;font-weight:700;margin-bottom:12px}
.chart-box canvas{max-height:280px}
/* Tables */
.tbl{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;margin-bottom:20px}
.tbl h3{padding:18px 22px 0;font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse;margin-top:10px}td,th{padding:10px 22px;font-size:13px;text-align:left}
th{font-weight:600;color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #f1f5f9}
td{border-bottom:1px solid #f8fafc}.r{text-align:right;font-weight:600}.g{color:#059669}.p{color:#6366f1}
.err{background:#fef2f2;color:#dc2626;padding:14px 18px;border-radius:12px;font-size:13px;display:none;margin-bottom:16px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;display:inline-block;margin-right:6px}
@media(max-width:768px){.dash{padding:16px}.grid{grid-template-columns:1fr 1fr}.card{padding:14px}.card .val{font-size:18px}.big .val{font-size:24px}.charts{grid-template-columns:1fr}}
</style></head><body>
<div id="login" class="login"><div class="box">
  <div class="logo">TokenLine Admin</div>
  <input id="pw" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')go()">
  <button onclick="go()">Masuk</button>
  <div class="err" id="lerr">Password salah</div>
</div></div>
<div id="dash" class="dash" style="display:none">
  <div class="topbar">
    <div class="logo">TokenLine</div>
    <div class="time"><span class="dot"></span> <span id="ts">—</span></div>
  </div>
  <h1>Dashboard</h1>
  <p class="sub">全人民币 ¥ · 1¥ ≈ 2,233 IDR · 30秒自动刷新</p>
  <div class="err" id="derr"></div>
  <div class="alerts" id="alerts"></div>
  <div class="grid">
    <div class="card big"><div class="lbl">DeepSeek 余额</div><div class="val" id="b1">—</div><div class="sub" id="b1s">—</div></div>
    <div class="card"><div class="lbl">总用户</div><div class="val" id="u1">—</div></div>
    <div class="card"><div class="lbl">付费用户</div><div class="val" id="u2">—</div></div>
    <div class="card"><div class="lbl">API成本 24h</div><div class="val" id="c1">—</div></div>
    <div class="card"><div class="lbl">请求数 24h</div><div class="val" id="c2">—</div></div>
    <div class="card"><div class="lbl">日消耗预测</div><div class="val" id="burn">—</div></div>
    <div class="card"><div class="lbl">余额可撑</div><div class="val" id="days">—</div></div>
    <div class="card"><div class="lbl">错误率</div><div class="val" id="errRate">—</div></div>
  </div>
  <div class="charts">
    <div class="chart-box"><h3>营收分布 (¥)</h3><canvas id="revChart"></canvas></div>
    <div class="chart-box"><h3>套餐利润率对比</h3><canvas id="profitChart"></canvas></div>
  </div>
  <div class="tbl"><h3>营收明细</h3><table><thead><tr><th>状态</th><th>¥ CNY</th><th>Rp IDR</th></tr></thead><tbody id="rtb"></tbody></table></div>
  <div class="tbl"><h3>套餐利润表</h3><table><thead><tr><th>套餐</th><th>售价 (¥)</th><th>净利 (¥)</th><th>利润率</th></tr></thead><tbody id="ptb"></tbody></table></div>
</div>
<script>
var K='', revChart=null, profitChart=null;
function go(){
  var p=document.getElementById('pw').value; if(!p)return;
  fetch('/api/admin/dashboard?key='+encodeURIComponent(p)).then(function(r){
    if(!r.ok)throw new Error(); return r.json();
  }).then(function(d){
    K=p; document.getElementById('login').style.display='none';
    document.getElementById('dash').style.display='block'; render(d); setInterval(load,30000);
  }).catch(function(){ document.getElementById('lerr').style.display='block'; });
}
function load(){
  fetch('/api/admin/dashboard?key='+encodeURIComponent(K)).then(function(r){ return r.json(); }).then(render).catch(function(e){
    document.getElementById('derr').style.display='block'; document.getElementById('derr').textContent='刷新失败: '+e.message;
  });
}
function fmtCNY(n){ return '¥'+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtRp(n){ return 'Rp '+Number(n).toLocaleString('id-ID'); }
function render(d){
  document.getElementById('derr').style.display='none';

  // Alerts
  var alerts=[];
  if(d.deepseek.balance_cny < 10) alerts.push({cls:'alert-red',icon:'🚨',msg:'余额不足 ¥10！立即充值！'});
  else if(d.deepseek.balance_cny < 50) alerts.push({cls:'alert-amber',icon:'⚡',msg:'余额低于 ¥50，建议充值'});
  else alerts.push({cls:'alert-green',icon:'✅',msg:'系统运行正常'});
  if(d.cost.alerts&&d.cost.alerts.length) d.cost.alerts.forEach(function(a){ alerts.push({cls:'alert-amber',icon:'⚠️',msg:a}); });
  if(d.revenue&&d.revenue.alerts&&d.revenue.alerts.length) d.revenue.alerts.forEach(function(a){ alerts.push({cls:'alert-red',icon:'🔴',msg:a}); });
  document.getElementById('alerts').innerHTML=alerts.map(function(a){ return '<div class=\"alert '+a.cls+'\">'+a.icon+' '+a.msg+'</div>'; }).join('');

  // Cards
  document.getElementById('b1').textContent=fmt¥(d.deepseek.balance_cny);
  document.getElementById('b1s').textContent=fmtRp(d.deepseek.balance_idr)+' · 1¥ ≈ 2,233 IDR';
  document.getElementById('u1').textContent=(d.users.total||0).toLocaleString();
  document.getElementById('u2').textContent=(d.users.paying||0).toLocaleString();
  document.getElementById('c1').textContent=fmt¥(Number(d.cost.total_cost_usd_24h||0)*7.3);
  document.getElementById('c2').textContent=(d.cost.total_requests_24h||0).toLocaleString();
  document.getElementById('burn').textContent=fmt¥(Number(d.cost.burn_rate_daily_usd||0)*7.3)+'/天';
  document.getElementById('days').textContent=d.cost.days_remaining||'∞';
  document.getElementById('errRate').textContent=(d.error_rate_pct||0).toFixed(1)+'%';

  // Revenue table
  var r=d.revenue&&d.revenue.revenue?d.revenue.revenue:{};
  var paid=Number(r.total_paid_idr||0), pending=Number(r.pending_idr||0), avail=Number(r.available_estimated||0);
  document.getElementById('rtb').innerHTML=[
    ['已收款',paid],[ '待结算 (Dodo 7-30天)',pending],[ '预估可用',avail]
  ].map(function(x){ return '<tr><td>'+x[0]+'</td><td class=r>'+fmt¥(x[1]/2233)+'</td><td class=r>'+fmtRp(x[1])+'</td></tr>'; }).join('');

  // Profit table
  document.getElementById('ptb').innerHTML=[
    ['Flash 2M',fmt¥(17.81),'¥9.15','51%','p'],['Flash 5M',fmt¥(40.13),'¥23.13','58%','p'],['Flash 12M',fmt¥(89.24),'¥53.23','60%','p'],
    ['Pro 500K',fmt¥(178.13),'¥147','83%','g'],['Pro 2M',fmt¥(669.20),'¥564','84%','g'],['Pro 6M',fmt¥(1785.27),'¥1,512','85%','g']
  ].map(function(p){ return '<tr><td>'+p[0]+'</td><td class=r>'+p[1]+'</td><td class=r>'+p[2]+'</td><td class="r '+p[4]+'">'+p[3]+'</td></tr>'; }).join('');

  // Revenue pie chart
  var ctx1=document.getElementById('revChart').getContext('2d');
  if(revChart) revChart.destroy();
  revChart=new Chart(ctx1,{type:'doughnut',data:{labels:['已收款','待结算','预估可用'],datasets:[{data:[paid/2233,pending/2233,avail/2233],backgroundColor:['#22c55e','#f59e0b','#6366f1'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:11}}}}});

  // Profit margin bar chart
  var ctx2=document.getElementById('profitChart').getContext('2d');
  if(profitChart) profitChart.destroy();
  profitChart=new Chart(ctx2,{type:'bar',data:{labels:['Flash 2M','Flash 5M','Flash 12M','Pro 500K','Pro 2M','Pro 6M'],datasets:[{label:'利润率 %',data:[51,58,60,83,84,85],backgroundColor:['#94a3b8','#94a3b8','#94a3b8','#6366f1','#6366f1','#8b5cf6'],borderRadius:6,borderWidth:0}]},options:{responsive:true,scales:{y:{max:100,ticks:{callback:function(v){return v+'%'}}}},plugins:{legend:{display:false}}}});

  document.getElementById('ts').textContent=new Date().toLocaleTimeString('id-ID');
}
</script></body></html>
