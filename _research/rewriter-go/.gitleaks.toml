# Gitleaks configuration for Pete/Campus project
# Docs: https://github.com/gitleaks/gitleaks
# Extended with custom patterns for the campus app codebase

title = "Pete Campus Security Scanner"

# Allowlist: paths to skip scanning
# Note: In TOML '''...''' literal strings, no escaping occurs.
# On Windows file paths use backslash, so [/\\] matches both / and \.
[allowlist]
paths = [
    '''\.git[/\\]''',
    '''\.gitleaks[/\\]''',
    '''node_modules[/\\]''',
    '''vendor[/\\]''',
    '''\.venv[/\\]''',
    '''__pycache__[/\\]''',
    '''\.pytest_cache[/\\]''',
    '''build[/\\]''',
    '''\.dart_tool[/\\]''',
    '''\.flutter-plugins[/\\]''',
    '''\.flutter_plugins''',
    '''\.packages''',
    '''pubspec\.lock''',
    '''poetry\.lock''',
    '''Cargo\.lock''',
    '''kernel_blob\.bin''',
    '''\.cache\.dill''',
    '''\.track\.dill''',
    '''\.semgrep_logs[/\\]''',
    '''\.claude[/\\]backups[/\\]''',
    '''\.claude[/\\]hooks[/\\]''',
    '''\.claude[/\\]skills[/\\]''',
    '''flutter_ohos[/\\]''',
    '''hooks_runner''',
    '''target[/\\]''',
    '''headroom[/\\]''',
    '''\.vscode[/\\]''',
    '''\.env\.example''',
    '''main\.dart\.js''',
    '''\.dill''',
    '''\.bin''',
    '''pet_config\.json''',
    '''wechat_pete\.log''',
    '''\.log''',
    '''superdesign-mcp-claude-code[/\\]''',
    '''audit[/\\]''',
    '''campus_app[/\\]server[/\\]backups[/\\]''',
    '''campus_app[/\\]server[/\\]__pycache__[/\\]''',
    '''beisen_packages[/\\]''',
    '''defending-code-harness[/\\]''',
    '''\.codegraph[/\\]''',
    '''\.codex[/\\]''',
    '''\.continue[/\\]''',
    '''\.peterc''',
    '''\.nuclei-templates[/\\]''',
    '''_research[/\\]''',
    '''_blog[/\\]''',
    '''_ppt_master[/\\]''',
    '''_google_reg\.py''',
    '''_build_articles\.py''',
    '''\.mcp\.json''',
    '''C.*31704_token\.json''',
    '''C.*31704.*\.html''',
    '''tmp[/\\]''',
    '''superdesign[/\\]''',
    '''tokenline-fix[/\\]''',
    '''_token\.txt''',
    '''_tmp_dodo_test\.sh''',
    '''tokenline_admin\.html''',
    '''tokenline_chat\.html''',
    '''e2e_stress\.js''',
    '''ci-pipeline\.sh''',
    '''campus_app[/\\]ohos[/\\]''',
    '''campus_app[/\\]server[/\\]static[/\\]''',
    '''\.claude[/\\]agents[/\\]''',
    '''\.jsonl''',
    '''temp_article\.html''',
    '''tmp_.*\.py''',
    '''_be_''',
    '''_server_''',
    '''_go_logs''',
    '''_p3\.txt''',
    '''_fix.*\.py''',
    '''_add_rule\.py''',
    '''_backend_check\.txt''',
    '''_nginx_clean''',
    '''\.claude[/\\]session_backup''',
    '''campus_app[/\\]docs[/\\]''',
    '''auto_deploy\.sh''',
    '''create_admins\.py''',
    '''fix_.*\.py''',
    '''final_session_fix\.py''',
    '''single_device_fix\.py''',
    '''install_sliver\.py''',
    '''stop_scanners\.py''',
    '''scripts[/\\]''',
    '''deploy\.py''',
