# Generic high-entropy string detection
[[rules]]
id = "high-entropy-base64"
description = "High-entropy Base64 string (potential secret)"
regex = '''(?i)(?:key|secret|password|token|auth|credential|api[_-]?key|access[_-]?key|secret[_-]?key|bearer|jwt|session|private[_-]?key)(?:\s*[=:]\s*|\s+)(['"'"])([a-zA-Z0-9+\/=]{20,})\b'''
entropy = 4.5
secret_group = 2
[[rules.allowlists]]
stopwords = [
    "example",
    "sample",
    "test",
    "dummy",
    "placeholder",
    "REDACTED",
    "xxxx",
    "deadbeef",
    "cafebabe",
    "abcdefgh",
    "AAAAAAAA",
    "00000000",
    "12345678",
]

[[rules]]
id = "high-entropy-hex"
description = "High-entropy hex string (potential secret)"
regex = '''(?i)(?:key|secret|password|token|auth|credential|api[_-]?key|access[_-]?key|secret[_-]?key|bearer|jwt|session|private[_-]?key)(?:\s*[=:]\s*|\s+)(['"'"])([a-f0-9]{16,})\b'''
entropy = 3.5
secret_group = 2
[[rules.allowlists]]
stopwords = [
    "deadbeef",
    "cafebabe",
    "dec0de",
    "feedface",
    "0000000",
    "ffffff",
]

# API key patterns
[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(?:api[_-]?key|apikey)(?:\s*[=:]\s*|\s+)(['"'"]?)([a-zA-Z0-9_\-]{16,64})\b'''
secret_group = 2

# JWT tokens
[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[a-zA-Z0-9_\-]{10,}\.eyJ[a-zA-Z0-9_\-]{10,}\.[a-zA-Z0-9_\-]{10,}'''
tags = ["jwt", "token"]

# AWS keys
[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''(?:AKIA|ASIA|AROA|AIDA|AIPA|ANPA|ANVA|APKA)[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
regex = '''(?i)aws[_-]?secret[_-]?access[_-]?key(?:\s*[=:]\s*|\s+)(['"'"]?)([a-zA-Z0-9\/+]{40})\b'''
secret_group = 2
tags = ["aws", "secret"]

# GitHub tokens
[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''gh[pousr]_[A-Za-z0-9_]{36,}'''
tags = ["github", "token"]

[[rules]]
id = "github-oauth"
description = "GitHub OAuth Access Token"
regex = '''gho_[A-Za-z0-9_]{36,}'''
tags = ["github", "token"]

# Generic private keys
[[rules]]
id = "private-key"
description = "Private Key (RSA/EC/ED25519)"
regex = '''-----BEGIN\s?(RSA|EC|DSA|OPENSSH|PRIVATE)\s?KEY-----'''
tags = ["key", "private"]

# Slack tokens
[[rules]]
id = "slack-token"
description = "Slack Bot Token"
regex = '''xox[baprs]-[0-9a-zA-Z]{10,}'''
tags = ["slack", "token"]

# Discord tokens
[[rules]]
id = "discord-token"
description = "Discord Bot Token"
regex = '''[MN][A-Za-z\d]{23}\.[A-Za-z\d]{6}\.[A-Za-z\d_\-]{27,}'''
tags = ["discord", "token"]

# Telegram tokens
[[rules]]
id = "telegram-bot-token"
description = "Telegram Bot API Token"
regex = '''[0-9]{8,10}:[a-zA-Z0-9_\-]{35}'''
tags = ["telegram", "token"]

# Database connection strings
[[rules]]
id = "postgres-url"
description = "PostgreSQL Connection String"
regex = '''postgres(?:ql)?:\/\/[a-zA-Z][a-zA-Z0-9_]*:[^@\s]+@'''
tags = ["database", "postgres"]

[[rules]]
id = "mysql-url"
description = "MySQL Connection String"
regex = '''mysql:\/\/[a-zA-Z][a-zA-Z0-9_]*:[^@\s]+@'''
tags = ["database", "mysql"]

[[rules]]
id = "redis-url"
description = "Redis Connection String"
regex = '''redis:\/\/[^@\s]+@'''
tags = ["database", "redis"]

# MongoDB
[[rules]]
id = "mongodb-url"
description = "MongoDB Connection String"
regex = '''mongodb(?:[\+srv])?:\/\/[a-zA-Z][a-zA-Z0-9_]*:[^@\s]+@'''
tags = ["database", "mongodb"]

# Generic password in URL (exclude file:// which is not a credential)
[[rules]]
id = "password-in-url"
description = "Password in URL"
regex = '''(?:https?|ftp|postgres(?:ql)?|mysql|redis|mongodb(?:[\+srv])?):\/\/[^:\s]+:[^@\s]+@'''
tags = ["url", "password"]
[[rules.allowlists]]
paths = [
  '''_research[/\\]tokenline-v12\.html''',
]
stopwords = [
  "fonts.googleapis.com",
  "Inter:wght@",
]

# JWT signing key hardcoded
[[rules]]
id = "jwt-secret-hardcoded"
description = "Hardcoded JWT signing secret"
regex = '''(?i)jwt[_-]?(?:secret|key|signing)[^=]{0,10}=\s*['"][a-zA-Z0-9_\-]{8,}['"]'''
tags = ["jwt", "secret"]

# DeepSeek API key
[[rules]]
id = "deepseek-api-key"
description = "DeepSeek API Key"
regex = '''sk-[a-zA-Z0-9]{20,}'''
tags = ["deepseek", "api-key"]

# OpenAI API key
[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''sk-proj-[a-zA-Z0-9_\-]{20,}'''
tags = ["openai", "api-key"]

# Google API key
[[rules]]
id = "google-api-key"
description = "Google API Key"
regex = '''AIza[0-9A-Za-z_\-]{35}'''
tags = ["google", "api-key"]

# Heroku API key
[[rules]]
id = "heroku-api-key"
description = "Heroku API Key"
regex = '''[hH][eE][rR][oO][kK][uU].*[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}'''
tags = ["heroku", "api-key"]

# Generic password assignment
[[rules]]
id = "password-assignment"
description = "Password hardcoded in variable"
regex = '''(?i)(?:password|passwd|pwd)\s*[=:]\s*['"'"'][^'"'"'\s]{6,}['"'"']'''
tags = ["password"]

# ---- Custom campus app patterns ----

# Aliyun RAM access key (starts with LTAI)
[[rules]]
id = "aliyun-access-key"
description = "Aliyun AccessKey ID"
regex = '''LTAI[a-zA-Z0-9]{12,}'''
tags = ["aliyun", "key"]

# Aliyun secret key assignment
[[rules]]
id = "aliyun-secret-key"
description = "Aliyun AccessKey Secret"
regex = '''(?i)aliyun[_-]?(access[_-]?key|secret)[^=]{0,10}=\s*['"][a-zA-Z0-9]{20,}['"]'''
tags = ["aliyun", "secret"]

# 64-char hex JWT secret (used by campus Go backend)
# Tightened: requires jwt/secret/key/token keyword on same line to cut false positives
[[rules]]
id = "jwt-hex-secret-64"
description = "64-char hex JWT secret"
regex = '''(?i)(?:jwt|secret|token|key|signing|password|auth)\w*\s*[=:]\s*['"]?([a-f0-9]{64})['"]?'''
secretGroup = 1
keywords = ["jwt","secret","token","key","signing","password","auth"]
tags = ["jwt", "secret"]

# Internal publish code (PUB-XXXXXX)
[[rules]]
id = "publish-code-token"
description = "Publish code token (PUB- prefix)"
regex = '''PUB-[A-Z0-9]{6}'''
tags = ["campus", "publish-code"]
[[rules.allowlists]]
stopwords = [
    "PUB-XXXXXX",
    "PUB-123456",
    "PUB-234567",
    "PUB-345678",
    "PUB-456789",
    "PUB-567890",
]

# tzxy-related internal credentials
[[rules]]
id = "tzxy-internal-password"
description = "tzxy-related internal credentials"
regex = '''(?i)tzxy.*(?:password|secret|token|key)\s*[=:].*'''
tags = ["campus", "tzxy"]
