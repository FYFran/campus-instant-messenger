<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Translate & Polish — Terjemahan Indonesia-Inggris natural. Bukan Google Translate kaku. Plus 'make it more professional' dalam satu klik. Gratis.">
<title>Translate & Polish — TokenLine</title>
<link rel="icon" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
:root{--acc:#6366f1;--bg:#faf8f5;--fg:#1a1a1a;--muted:#6b6b6b;--card:#fff;--hair:#e5e7eb;--radius:12px}
[data-theme="dark"]{--bg:#0a0a0b;--fg:#f0f0f0;--muted:#888;--card:#141416;--hair:#222}
body{font:400 16px/1.6 'DM Sans',sans-serif;color:var(--fg);background:var(--bg);margin:0}
nav{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--hair);padding:.75rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.logo{font:italic 700 1.35rem 'Playfair Display',serif;color:var(--fg);text-decoration:none}
.logo span{background:linear-gradient(135deg,var(--acc),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{display:inline-flex;padding:.55rem 1.2rem;border-radius:8px;font:600 .9rem 'DM Sans',sans-serif;cursor:pointer;border:none;text-decoration:none}
.btn-primary{background:var(--acc);color:#fff}.btn-ghost{background:transparent;color:var(--fg)}
.container{max-width:800px;margin:0 auto;padding:2rem 1.5rem}
.hero{text-align:center;padding:3rem 0 2rem}
.hero h1{font:800 2.2rem/1.15 'DM Sans',sans-serif}
.hero p{color:var(--muted);font-size:1.05rem;max-width:500px;margin:.5rem auto 0}
.lang-bar{display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.lang-btn{padding:.5rem 1.2rem;border:1px solid var(--hair);border-radius:20px;cursor:pointer;background:var(--card);color:var(--fg);font:.85rem 'DM Sans',sans-serif}
.lang-btn.active{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 10%,transparent)}
textarea{width:100%;min-height:150px;padding:1rem;border:1px solid var(--hair);border-radius:var(--radius);font:400 .95rem 'DM Sans',sans-serif;background:var(--bg);color:var(--fg);resize:vertical;box-sizing:border-box}
.actions{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
.result-box{background:var(--card);border:1px solid var(--hair);border-radius:var(--radius);padding:1.5rem;margin-top:1.5rem;display:none;white-space:pre-wrap}
.result-box.show{display:block}
.copy-btn{padding:.4rem 1rem;border:1px solid var(--hair);border-radius:6px;cursor:pointer;font:.8rem 'DM Sans',sans-serif;background:var(--card);color:var(--fg)}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:.82rem}
@media(max-width:640px){.hero h1{font-size:1.6rem}}
</style>
</head>
<body>
<nav><a href="/" class="logo">Token<span>Line</span></a><div><a href="/chat/" class="btn btn-ghost">Chat</a><a href="/login.html" class="btn btn-ghost">Masuk</a></div></nav>
<div class="container">
<div class="hero"><h1>🌐 Translate & Polish</h1><p>Terjemahan natural Indonesia ↔ Inggris. Bukan Google Translate kaku. Plus "make it professional" dalam satu klik.</p></div>
<div class="lang-bar" id="lang-bar">
  <button class="lang-btn active" data-dir="id-en">Indonesia → Inggris</button>
  <button class="lang-btn" data-dir="en-id">Inggris → Indonesia</button>
</div>
<textarea id="input" placeholder="Tulis atau paste teks di sini..."></textarea>
<div class="actions">
  <button class="btn btn-primary" onclick="translateText('default')">🔄 Translate</button>
  <button class="btn" style="background:color-mix(in srgb,var(--acc) 15%,transparent);color:var(--fg)" onclick="translateText('professional')">💼 Make Professional</button>
  <button class="btn" style="background:color-mix(in srgb,var(--acc) 15%,transparent);color:var(--fg)" onclick="translateText('casual')">💬 Make Casual</button>
  <button class="btn" style="background:transparent;color:var(--fg);border:1px solid var(--hair)" onclick="translateText('shorten')">✂️ Summarize</button>
</div>
<div class="result-box" id="result"></div>
<div style="text-align:right;margin-top:.5rem"><button class="copy-btn" onclick="copyResult()" id="copy-btn" style="display:none">📋 Copy</button></div>
</div>
<footer>TokenLine &copy; 2026 · <a href="/privacy.html">Privasi</a> · <a href="/tos.html">Syarat</a></footer>
<script>
var dir='id-en';document.getElementById('lang-bar').onclick=function(e){if(e.target.classList.contains('lang-btn')){document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');dir=e.target.dataset.dir}}
async function translateText(style){
  var text=document.getElementById('input').value.trim();if(!text)return;
  var t=localStorage.getItem('tl_tok');if(!t){location.href='/login.html';return}
  var prompt;if(dir==='id-en')prompt='Terjemahkan ke bahasa Inggris. ';else prompt='Terjemahkan ke bahasa Indonesia. ';
  if(style==='professional')prompt+='Buat lebih profesional dan formal. ';else if(style==='casual')prompt+='Buat lebih santai dan natural. ';else if(style==='shorten')prompt+='Ringkas menjadi lebih pendek. ';
  prompt+='Jangan tambahkan penjelasan. Output hanya hasil terjemahan. Teks: '+text;
  document.getElementById('result').textContent='Menerjemahkan...';document.getElementById('result').classList.add('show');
  try{var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+t},body:JSON.stringify({message:prompt,model:'deepseek-v4-flash'})});
  if(!r.ok){if(r.status==401){location.href='/login.html'}throw new Error('Gagal')}
  var d=await r.json();document.getElementById('result').textContent=d.content||d.message||'Coba lagi.';document.getElementById('copy-btn').style.display='inline-block'}
  catch(e){document.getElementById('result').textContent='Gagal terhubung. Coba lagi.'}
}
function copyResult(){var t=document.getElementById('result').textContent;navigator.clipboard.writeText(t).then(()=>{var b=document.getElementById('copy-btn');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1500)})}
</script>
</body>
</html>
