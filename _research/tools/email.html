<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Email Profesional dalam Bahasa Inggris natural. Lamaran kerja, proposal bisnis, follow-up client. Bukan Google Translate. Gratis 3x.">
<title>Email Profesional — TokenLine</title>
<link rel="icon" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
:root{--acc:#6366f1;--bg:#faf8f5;--fg:#1a1a1a;--muted:#6b6b6b;--card:#fff;--hair:#e5e7eb;--radius:12px}
[data-theme="dark"]{--bg:#0a0a0b;--fg:#f0f0f0;--muted:#888;--card:#141416;--hair:#222}
body{font:400 16px/1.6 'DM Sans',sans-serif;color:var(--fg);background:var(--bg);margin:0}
nav{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--hair);padding:.75rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.logo{font:italic 700 1.35rem 'Playfair Display',serif;color:var(--fg);text-decoration:none}
.logo span{background:linear-gradient(135deg,var(--acc),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{display:inline-flex;align-items:center;padding:.55rem 1.2rem;border-radius:8px;font:600 .9rem 'DM Sans',sans-serif;cursor:pointer;border:none;text-decoration:none}
.btn-primary{background:var(--acc);color:#fff}.btn-ghost{background:transparent;color:var(--fg)}
.container{max-width:800px;margin:0 auto;padding:2rem 1.5rem}
.hero{text-align:center;padding:3rem 0 2rem}
.hero h1{font:800 2.2rem/1.15 'DM Sans',sans-serif;margin:0 0 .5rem}
.hero p{color:var(--muted);font-size:1.05rem;max-width:500px;margin:0 auto}
.form-card{background:var(--card);border:1px solid var(--hair);border-radius:var(--radius);padding:2rem}
label{display:block;font-size:.85rem;font-weight:600;margin:1rem 0 .35rem;color:var(--fg)}
select,input,textarea{width:100%;padding:.65rem;border:1px solid var(--hair);border-radius:8px;font:400 .95rem 'DM Sans',sans-serif;background:var(--bg);color:var(--fg);box-sizing:border-box}
textarea{min-height:120px;resize:vertical}
.result{background:var(--card);border:1px solid var(--hair);border-radius:var(--radius);padding:1.5rem;margin-top:1.5rem;display:none;white-space:pre-wrap;line-height:1.7}
.result.show{display:block}
.spinner{display:none;text-align:center;padding:2rem;color:var(--muted)}
.types-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem;margin-top:.5rem}
.type-btn{padding:.65rem;border:1px solid var(--hair);border-radius:8px;background:var(--card);cursor:pointer;text-align:center;font-size:.85rem;font-family:'DM Sans',sans-serif}
.type-btn.active{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 10%,transparent)}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:.82rem}
@media(max-width:640px){.hero h1{font-size:1.6rem}}
</style>
</head>
<body>
<nav><a href="/" class="logo">Token<span>Line</span></a><div><a href="/chat/" class="btn btn-ghost">Chat</a><a href="/login.html" class="btn btn-ghost">Masuk</a></div></nav>
<div class="container">
<div class="hero"><h1>✉️ Email Profesional</h1><p>Bahasa Inggris natural untuk lamaran kerja, proposal, follow-up. Bukan Google Translate biasa.</p></div>
<div class="form-card">
<label>Jenis Email</label>
<div class="types-grid" id="types">
  <button class="type-btn active" data-type="lamaran">Surat Lamaran</button>
  <button class="type-btn" data-type="followup">Follow-up Client</button>
  <button class="type-btn" data-type="proposal">Proposal Bisnis</button>
  <button class="type-btn" data-type="thankyou">Thank You Email</button>
  <button class="type-btn" data-type="meeting">Meeting Request</button>
  <button class="type-btn" data-type="resign">Resignation Letter</button>
  <button class="type-btn" data-type="invoice">Invoice Email</button>
  <button class="type-btn" data-type="custom">Custom</button>
</div>
<label>Posisi / Tujuan</label><input type="text" id="position" placeholder="Contoh: Marketing Manager di PT ABC">
<label>Nama Perusahaan</label><input type="text" id="company" placeholder="Contoh: PT Maju Bersama">
<label>Skill / Pengalaman (opsional)</label><input type="text" id="skills" placeholder="Contoh: 3 tahun digital marketing, Google Ads certified">
<label>Nada (Tone)</label><select id="tone"><option value="professional">Profesional</option><option value="friendly">Ramah</option><option value="formal">Formal</option><option value="confident">Percaya Diri</option></select>
<label>Info Tambahan</label><textarea id="extra" placeholder="Detail tambahan yang ingin disampaikan..."></textarea>
<button class="btn btn-primary" onclick="generate()" style="width:100%;margin-top:1.5rem;justify-content:center;padding:.75rem">✨ Generate Email</button>
<div class="spinner" id="spinner">⏳ Menulis email profesional...</div>
<div class="result" id="result"></div>
</div>
</div>
<footer>TokenLine &copy; 2026 · <a href="/privacy.html">Privasi</a> · <a href="/tos.html">Syarat</a></footer>
<script>
var sel='lamaran';document.getElementById('types').onclick=function(e){if(e.target.classList.contains('type-btn')){document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');sel=e.target.dataset.type}}
async function generate(){
  var p=document.getElementById('position').value,co=document.getElementById('company').value;
  var sk=document.getElementById('skills').value,to=document.getElementById('tone').value;
  var ex=document.getElementById('extra').value;
  var t=localStorage.getItem('tl_tok');if(!t){location.href='/login.html';return}
  document.getElementById('spinner').style.display='block';document.getElementById('result').classList.remove('show');
  var prompt='Tulis email '+sel+' dalam bahasa Inggris yang natural dan '+to+'. Posisi: '+p+'. Perusahaan: '+co+'. Skill: '+sk+'. Info tambahan: '+ex+'. Format: subject line, salam, isi, penutup. Jangan pakai template generic.';
  try{var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+t},body:JSON.stringify({message:prompt,model:'deepseek-v4-flash'})});
  if(!r.ok){if(r.status==401){location.href='/login.html'}throw new Error('Gagal')}
  var d=await r.json();document.getElementById('result').textContent=d.content||d.message||'Coba lagi.';document.getElementById('result').classList.add('show')}
  catch(e){document.getElementById('result').textContent='Gagal terhubung. Coba lagi.';document.getElementById('result').classList.add('show')}
  document.getElementById('spinner').style.display='none'
}
</script>
</body>
</html>
