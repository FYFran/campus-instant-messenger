<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>TokenLine - AI untuk Semua</title>
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--accent:#6366f1;--green:#10b981;--text:#f1f5f9;--muted:#64748b;--border:#1e293b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface)}
header h1{font-size:15px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;padding:10px 14px;border-radius:14px;line-height:1.7;font-size:14px;word-break:break-word;animation:in .2s ease}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:var(--surface);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
#input-bar{display:flex;padding:10px 12px;gap:8px;background:var(--surface);border-top:1px solid var(--border)}
#input-bar textarea{flex:1;padding:10px 12px;border:1px solid #333;border-radius:12px;background:var(--bg);color:var(--text);font-size:14px;resize:none;outline:none;max-height:100px;line-height:1.5}
#input-bar textarea:focus{border-color:var(--accent)}
#input-bar button{width:40px;height:40px;border:none;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#input-bar button:disabled{opacity:0.3}
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px}
#auth-screen.hidden{display:none}
#auth-screen h2{font-size:22px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
#auth-screen input{padding:12px 16px;border:1px solid #333;border-radius:10px;background:var(--surface);color:var(--text);font-size:14px;width:300px;max-width:90%}
#auth-screen button{padding:12px 24px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;cursor:pointer;width:300px;max-width:90%}
#auth-screen .link{background:none;color:var(--muted);font-size:12px;width:auto;padding:4px}
#price-bar{display:flex;gap:8px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;font-size:11px;align-items:center}
#price-bar span{white-space:nowrap;color:var(--muted)}
#price-bar .plan{padding:4px 10px;border-radius:20px;background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap;font-weight:600}
#status{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(16,185,129,0.15);color:var(--green)}
</style>
</head>
<body>

<div id="auth-screen">
  <h2>TokenLine</h2>
  <p style="color:var(--muted);font-size:13px;margin-bottom:12px">AI untuk Semua &middot; Mulai gratis</p>
  <input id="a-email" type="email" placeholder="Email">
  <input id="a-pass" type="password" placeholder="Kata sandi (min 6 karakter)">
  <button onclick="doAuth()" id="a-btn">Daftar Gratis</button>
  <button class="link" onclick="toggleAuth()">Sudah punya akun? Masuk</button>
</div>

<header>
  <h1>TokenLine</h1>
  <span id="status">Gratis</span>
</header>

<div id="price-bar">
  <span>Upgrade:</span>
  <span class="plan" onclick="upgrade('bulanan')">30rb/bln</span>
  <span class="plan" onclick="upgrade('premium')">50rb/bln</span>
</div>

<div id="chat"><div style="text-align:center;color:var(--muted);margin-top:40%">Ketik pesan untuk memulai</div></div>

<div id="input-bar">
  <textarea id="textin" rows="1" placeholder="Ketik pesan..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="sendbtn" onclick="send()">&#8593;</button>
</div>

<script>
var T=localStorage.getItem('tl_tok'),chat=document.getElementById('chat'),ti=document.getElementById('textin'),bt=document.getElementById('sendbtn'),loginMode=false;
if(T){document.getElementById('auth-screen').classList.add('hidden');loadPlan()}

function toggleAuth(){loginMode=!loginMode;document.getElementById('a-btn').textContent=loginMode?'Masuk':'Daftar Gratis'}

async function doAuth(){
  var e=document.getElementById('a-email').value.trim(),p=document.getElementById('a-pass').value;
  if(!e||p.length<6)return alert('Email dan password min 6 karakter');
  var ep=loginMode?'login':'register',r=await fetch('/api/auth/'+ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});
  var d=await r.json();
  if(r.ok&&d.token){T=d.token;localStorage.setItem('tl_tok',T);document.getElementById('auth-screen').classList.add('hidden');loadPlan()}
  else alert(d.message||'Gagal')
}

async function loadPlan(){
  if(!T)return;
  try{var r=await fetch('/api/chat/history',{headers:{Authorization:'Bearer '+T}});}catch(e){}
  document.getElementById('status').textContent='Online';
}

async function send(){
  if(!T)return;
  var t=ti.value.trim();if(!t)return;
  app('user',t);ti.value='';bt.disabled=true;
  var d=app('bot','...');
  try{
    var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+T},body:JSON.stringify({message:t})});
    if(r.status==403){d.textContent='Kuota habis. Silakan upgrade.';if(confirm('Upgrade ke Bulanan (Rp 30.000)?'))upgrade('bulanan')}
    else if(!r.ok){var e=await r.json();d.textContent='Error: '+(e.message||r.status)}
    else{var rd=r.body.getReader(),dc=new TextDecoder(),full='';d.textContent='';
      while(true){var v=await rd.read();if(v.done)break;
        var lines=dc.decode(v.value,{stream:true}).split('\n');
        for(var i=0;i<lines.length;i++){var ln=lines[i];if(!ln.startsWith('data: ')||ln.includes('[DONE]'))continue;
          try{var j=JSON.parse(ln.slice(6));if(j.choices&&j.choices[0]){full+=j.choices[0].delta.content||'';d.textContent=full;chat.scrollTop=chat.scrollHeight}}catch(e){}
        }
      }
    }
  }catch(e){d.textContent='Koneksi gagal'}
  bt.disabled=false;ti.focus()
}

function app(role,text){var d=document.createElement('div');d.className='msg '+role;d.textContent=text;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d}

function upgrade(plan){if(!T)return;var p=prompt('Konfirmasi upgrade ke '+plan+'? Ketik YA');if(p!=='YA')return;fetch('/api/payment/create',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+T},body:JSON.stringify({plan:plan})}).then(r=>r.json()).then(d=>{alert('Invoice: '+d.invoice_id+'\\nSilakan bayar untuk aktivasi.')})}
</script>
</body>
</html>
